# ============================================================
# spectangle — U-Net 2D→3D Model Config
# ============================================================
# NOTE on input shape: spectrograms are padded by the forward model along the
# dispersion axis.  The U-Net encoder accepts the full padded tensor
# (B, C_in, ny+2·pad_y, nx+2·pad_x) and the decoder reconstructs the scene
# at the original (ny, nx) resolution via the spectral expansion head.
# Check sim.spectrogram_shape after building a simulator.

model:
  type: unet                     # "unet" | "vit" | "pinn"
  in_channels: 4                 # 4 (spectrograms only) | 5 (+ direct image)
  n_lambda: 128
  base_features: 32
  depth: 4

training:
  n_epochs: 100
  batch_size: 16
  learning_rate: 1.0e-4
  lr_scheduler: reduce_on_plateau
  lr_patience: 10
  lr_factor: 0.5
  grad_clip_norm: 1.0
  seed: 42

loss:
  mse: 1.0
  ssim: 0.5
  spectral: 0.1
  physics: 0.0                   # set > 0 only for PINN

data:
  h5_path: data/raw/simple_mini_1000s.h5
  split_ratios: [0.8, 0.1, 0.1]
  normalise: per_sample
  num_workers: 4

output:
  checkpoint_dir: checkpoints/unet
  log_csv: logs/unet_training.csv
